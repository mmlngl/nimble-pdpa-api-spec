$kind: http-request
name: 'Get a specific T&C version'
description: |-
  Returns a specific T&C version by `tAndCId`. Useful for letting customers review a version they previously agreed to.

  **Path param:** `tAndCId` (integer) — the ID of the T&C version.
  **Returns:** the matching T&C object with `id`, `content`, and `publishedOn`.
method: GET
url: '{{baseUrl}}/terms-and-conditions/{{tAndCId}}'
order: 3000
