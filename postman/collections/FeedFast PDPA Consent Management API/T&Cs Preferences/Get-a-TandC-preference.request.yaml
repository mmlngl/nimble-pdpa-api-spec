$kind: http-request
name: Get a T&C preference
description: >-
  Returns the customer's preference for the specified T&C version. If no record
  exists yet, sensible defaults are returned without writing to the database.
  This is read-only and has no side effects. Use the PATCH endpoint to create
  or update preferences.

  **Path params:** `customerId` (string), `tAndCId` (integer).

  **Returns:** a preference record with `customerId`, `tAndCId`, `preference`
  (PENDING | OPT-IN | OPT-OUT), and `lastUpdated`.
method: GET
url: "{{baseUrl}}/customers/{{customerId}}/preferences/{{tAndCId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 1000
