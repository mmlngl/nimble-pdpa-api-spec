$kind: http-request
name: Submit a customer T&C preference
description: >-
  Creates or updates the customer's preference for the specified T&C version.
  If the preference doesn't exist, it will be created. Only `OPT-IN` or `OPT-OUT`
  are accepted — `PENDING` is system-managed and cannot be set here. `lastUpdated`
  is refreshed server-side on every update.

  **Path params:** `customerId` (string), `tAndCId` (integer).

  **Request body:** `preference` (string, required) — either `"OPT-IN"` or
  `"OPT-OUT"`.

  **Returns:** the updated preference record.
method: PATCH
url: "{{baseUrl}}/customers/{{customerId}}/preferences/{{tAndCId}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 2000
headers:
  Content-Type: application/json
body:
  type: json
  content: '{"preference": "OPT-IN"}'
