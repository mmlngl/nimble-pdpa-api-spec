$kind: http-request
name: Get a marketing preference
description: >-
  Returns the customer's marketing preference for the specified channel. If no
  record exists yet, sensible defaults are returned without writing to the
  database. This is read-only and has no side effects. Use the PATCH endpoint
  to create or update preferences.

  **Path params:** `customerId` (string), `channel` (string — `EMAIL`, `SMS`,
  or `PUSH`).

  **Returns:** a preference record with `customerId`, `channel`, `preference`
  (PENDING | OPT_IN | OPT_OUT), and `lastUpdated`.
method: GET
url: "{{baseUrl}}/customers/{{customerId}}/marketing-preferences/{{channel}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 1000
