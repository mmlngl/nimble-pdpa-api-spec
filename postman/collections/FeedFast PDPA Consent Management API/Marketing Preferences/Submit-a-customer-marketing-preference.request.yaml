$kind: http-request
name: Submit a customer marketing preference
description: >-
  Updates the customer's marketing preference for the specified channel. Only
  `OPT_IN` or `OPT_OUT` are accepted — `PENDING` is system-managed and cannot be
  set here. `lastUpdated` is refreshed server-side on every update.

  **Path params:** `customerId` (string), `channel` (string — `EMAIL`, `SMS`, or
  `PUSH`).

  **Request body:** `preference` (string, required) — either `"OPT_IN"` or
  `"OPT_OUT"`.

  **Returns:** the updated preference record.
method: PATCH
url: "{{baseUrl}}/customers/{{customerId}}/marketing-preferences/{{channel}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 2000
headers:
  Content-Type: application/json
body:
  type: json
  content: '{"preference": "OPT_IN"}'
