$kind: http-request
name: Get or create a marketing preference
description: >-
  Returns the customer's marketing preference for the specified channel. If no
  record exists yet, one is auto-created with `preference = PENDING` and
  returned (HTTP 201). This is the endpoint the app calls on login to decide
  whether to show the marketing opt-in screen.

  **Path params:** `customerId` (string), `channel` (string — `EMAIL`, `SMS`,
  or `PUSH`).

  **Returns:** a preference record with `customerId`, `channel`, `preference`
  (PENDING | OPT_IN | OPT_OUT), and `lastUpdated`.
method: GET
url: "{{baseUrl}}/customers/{{customerId}}/marketing-preferences/{{channel}}"
auth:
  type: bearer
  credentials:
    token: "{{authToken}}"
order: 1000
